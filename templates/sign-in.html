<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — The Black Whale</title>
  <script src="/static/app-routing.js"></script>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .background-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0.3;
    }

    .background-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .sign-in-container {
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-section img {
      height: 50px;
      width: auto;
      margin-bottom: 15px;
    }

    .logo-section h1 {
      font-size: 28px;
      color: #1a1a1a;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .logo-section p {
      color: #666;
      font-size: 14px;
    }

    .form-header {
      margin-bottom: 25px;
    }

    .form-header h2 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .form-header p {
      color: #888;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
      background-color: #f8f9ff;
    }

    .form-group input::placeholder {
      color: #999;
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      cursor: pointer;
      color: #555;
      margin: 0;
      font-weight: 500;
    }

    .remember-forgot input[type="checkbox"] {
      margin-right: 6px;
      width: auto;
      cursor: pointer;
    }

    .remember-forgot a {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .remember-forgot a:hover {
      color: #0056b3;
    }

    .error-message {
      display: none;
      padding: 12px 14px;
      margin-bottom: 20px;
      background-color: #ffebee;
      border: 1px solid #ef5350;
      border-radius: 6px;
      color: #c62828;
      font-size: 13px;
      animation: slideIn 0.3s ease-out;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      display: none;
      padding: 12px 14px;
      margin-bottom: 20px;
      background-color: #e8f5e9;
      border: 1px solid #66bb6a;
      border-radius: 6px;
      color: #2e7d32;
      font-size: 13px;
      animation: slideIn 0.3s ease-out;
    }

    .success-message.show {
      display: block;
    }

    .sign-in-btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
    }

    .sign-in-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 123, 255, 0.4);
    }

    .sign-in-btn:active {
      transform: translateY(0);
    }

    .sign-in-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #bbb;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: #ddd;
    }

    .divider span {
      padding: 0 12px;
      font-size: 13px;
      color: #999;
    }

    .social-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .social-btn {
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .social-btn:hover {
      background: #eeeeee;
      border-color: #bbb;
    }

    .sign-up-link {
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .sign-up-link a {
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .sign-up-link a:hover {
      color: #0056b3;
      text-decoration: underline;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .button-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .sign-in-container {
        padding: 30px 20px;
        max-width: 100%;
        margin: 20px;
      }

      .logo-section h1 {
        font-size: 24px;
      }

      .form-header h2 {
        font-size: 20px;
      }

      .social-buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <video class="background-video" autoplay loop muted playsinline preload="auto">
    <source src="/static/whalebackground.mp4" type="video/mp4">
  </video>
  <div class="background-overlay"></div>

  <div class="sign-in-container">
    <div class="logo-section">
      <img src="/static/newblackwhale.png" alt="The Black Whale logo">
      <h1>The Black Whale</h1>
      <p>Premium E-Commerce Platform</p>
    </div>

    <div class="form-header">
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="signInForm" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="you@example.com" 
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password" 
          required
          autocomplete="current-password"
        >
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe" name="rememberMe">
          Remember me
        </label>
        <a href="#forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="sign-in-btn" id="signInBtn">
        <div class="button-content">
          <span>Sign In</span>
          <div class="loading-spinner" id="spinner"></div>
        </div>
      </button>
    </form>

    <div class="divider">
      <span>or continue with</span>
    </div>

    <div class="social-buttons">
      <button type="button" class="social-btn" onclick="handleSocialLogin('google')">
        <span>Google</span>
      </button>
      <button type="button" class="social-btn" onclick="handleSocialLogin('github')">
        <span>GitHub</span>
      </button>
    </div>

    <div class="sign-up-link">
      Don't have an account? <a href="/register">Create one now</a>
    </div>
  </div>

  <script>
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
      setTimeout(() => errorDiv.classList.remove('show'), 5000);
    }

    function showSuccess(message) {
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.classList.add('show');
      setTimeout(() => successDiv.classList.remove('show'), 3000);
    }

    async function handleSignIn(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const btn = document.getElementById('signInBtn');
      const spinner = document.getElementById('spinner');

      // Validate inputs
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      // Show loading state
      btn.disabled = true;
      spinner.style.display = 'block';

      try {
        const response = await fetch(appUrl('/login_post'), {
            method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (data.success) {
          showSuccess('Sign in successful! Redirecting...');
          
          // Save remember me preference
          if (rememberMe) {
            localStorage.setItem('rememberedEmail', email);
          } else {
            localStorage.removeItem('rememberedEmail');
          }

          // Redirect after brief delay
          setTimeout(() => {
            window.location.href = appUrl(data.redirect);
          }, 500);
        } else {
          showError(data.message || 'Sign in failed. Please try again.');
          btn.disabled = false;
          spinner.style.display = 'none';
        }
      } catch (error) {
        showError('An error occurred. Please try again later.');
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    function handleSocialLogin(provider) {
      showError(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`);
    }

    // Load remembered email on page load
    window.addEventListener('load', function() {
      const rememberedEmail = localStorage.getItem('rememberedEmail');
      if (rememberedEmail) {
        document.getElementById('email').value = rememberedEmail;
        document.getElementById('rememberMe').checked = true;
      }
    });

    // Clear error/success messages when user starts typing
    document.getElementById('email').addEventListener('focus', function() {
      document.getElementById('errorMessage').classList.remove('show');
    });

    document.getElementById('password').addEventListener('focus', function() {
      document.getElementById('errorMessage').classList.remove('show');
    });
  </script>
</body>
</html>
