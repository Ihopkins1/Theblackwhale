<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — The Black Whale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <video class="background-video" autoplay loop muted playsinline preload="auto">
        <source src="whalebackground.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="page-frame">
        <header class="site-header">
        <a class="site-brand" href="storepage.html">
            <img class="site-logo" src="newblackwhale.png" alt="The Black Whale logo">
            <span>The Black Whale</span>
        </a>
        <nav class="site-nav">
            <a href="storepage.html">Store</a>
            <a href="inventory.html">Inventory</a>
            <a href="seller.html">Seller</a>
        </nav>
        </header>
        <main class="page-shell">
        <section class="panel form-card">
            <div>
            <h1 class="section-title">Create Account</h1>
            <p class="section-copy">Sign up to manage inventory, view seller dashboards, or access admin controls.</p>
            </div>
            <div id="error-message" class="error-message"></div>
            <form id="createAccountForm">
                <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter your password">
                </div>
                <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input id="confirm-password" type="password" placeholder="Confirm your password">
                </div>
                <button type="button" class="btn btn-primary" onclick="validateForm()">Create Account</button>
            </form>
        </section>
        </main>
    </div>
</body>
<script>
function validateForm() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirm-password').value.trim();
    const errorMessage = document.getElementById('error-message');
    
    errorMessage.textContent = '';
    errorMessage.classList.remove('show');
    
    // Check if any field is empty
    if (!email || !password || !confirmPassword) {
        errorMessage.textContent = 'All fields are required. Please fill in all the fields.';
        errorMessage.classList.add('show');
        return false;
    }
    
    // Email validation part
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        errorMessage.textContent = 'Please enter a valid email address.';
        errorMessage.classList.add('show');
        return false;
    }
    
    // If validation passes, your account will be successfully created 
    alert('Account created successfully!');
    return false;
}
</script>
</html>
