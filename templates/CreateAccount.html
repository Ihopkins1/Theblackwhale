<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — The Black Whale</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <video class="background-video" autoplay loop muted playsinline preload="auto">
        <source src="/static/whalebackground.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="page-frame">
        <header class="site-header">
        <a class="site-brand" href="/">
            <img class="site-logo" src="/static/newblackwhale.png" alt="The Black Whale logo">
            <span>The Black Whale</span>
        </a>
        <nav class="site-nav">
            <a href="/">Store</a>
            <a href="/inventory">Inventory</a>
            <a href="/seller">Seller</a>
        </nav>
        </header>
        <main class="page-shell">
        <section class="panel form-card">
            <div>
            <h1 class="section-title">Create Account</h1>
            <p class="section-copy">Sign up to manage inventory, view seller dashboards, or access admin controls.</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <form id="createAccountForm">
                <div class="form-group">
                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input id="confirm-password" type="password" placeholder="Confirm your password" required>
                </div>
                <div class="button-row">
                  <button type="submit" class="button button-primary">Create Account</button>
                  <a href="/templates/sign-in.html" class="button button-secondary">Back to Login</a>
                </div>
            </form>
        </section>
        </main>
        <footer class="site-footer">© 2026 The Black Whale</footer>
    </div>
    <div class="page-transition-overlay active">
      <img src="/static/newblackwhale.png" alt="The Black Whale logo">
    </div>

    <script>
      document.getElementById('createAccountForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const errorMessage = document.getElementById('error-message');
        
        // Client-side validation
        if (password.length < 6) {
          errorMessage.textContent = 'Password must be at least 6 characters';
          errorMessage.style.display = 'block';
          return;
        }
        
        if (password !== confirmPassword) {
          errorMessage.textContent = 'Passwords do not match';
          errorMessage.style.display = 'block';
          return;
        }
        
        try {
          const response = await fetch('/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: email,
              password: password,
              confirm_password: confirmPassword
            })
          });
          
          const data = await response.json();
          
          if (data.success) {
            errorMessage.style.display = 'none';
            // Redirect to home page or dashboard
            window.location.href = data.redirect;
          } else {
            errorMessage.textContent = data.message;
            errorMessage.style.display = 'block';
          }
        } catch (error) {
          errorMessage.textContent = 'An error occurred. Please try again.';
          errorMessage.style.display = 'block';
        }
      });

      function goToLogin() {
        window.location.href = '/sign-in';
      }

      (function() {
        const overlay = document.querySelector('.page-transition-overlay');

        window.addEventListener('pageshow', () => {
          document.body.classList.remove('transitioning');
          overlay.classList.remove('active');
        });
      })();
    </script>

    <style>
      .error-message {
        color: #d32f2f;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #d32f2f;
        border-radius: 4px;
        background-color: #ffebee;
      }
      
      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      
      .button {
        flex: 1;
      }
    </style>
</body>
</html>
