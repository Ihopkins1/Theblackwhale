<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — The Black Whale</title>
  <script src="/static/app-routing.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <video class="background-video" autoplay loop muted playsinline preload="auto">
    <source src="/static/whalebackground.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <div class="page-frame">
    <header class="site-header">
      <a class="site-brand" href="/">
        <img class="site-logo" src="/static/newblackwhale.png" alt="The Black Whale logo">
        <span>The Black Whale</span>
      </a>
      <nav class="site-nav">
        <a href="/">Store</a>
        <a href="/inventory">Inventory</a>
        <a href="/seller">Seller</a>
      </nav>
    </header>
    <main class="page-shell">
      <section class="panel form-card">
        <div>
          <h1 class="section-title">Login</h1>
          <p class="section-copy">Sign in to manage inventory, view seller dashboards, or access admin controls.</p>
        </div>
        <div id="error-message" class="error-message" style="display: none;"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input id="email" type="email" placeholder="your@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="********" required>
          </div>
          <div class="button-row">
            <button class="button button-primary" type="submit">Sign in</button>
            <button class="button button-secondary" type="button" onclick="goToCreateAccount()">Create account</button>
          </div>
        </form>
      </section>
    </main>
    <footer class="site-footer">© 2026 The Black Whale</footer>
  </div>
  <div class="page-transition-overlay active">
    <img src="/static/newblackwhale.png" alt="The Black Whale logo">
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');

      try {
        const response = await fetch(appUrl('/login_post'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (data.success) {
          errorMessage.style.display = 'none';
          window.location.href = appUrl(data.redirect);
        } else {
          errorMessage.textContent = data.message;
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    });

    function goToCreateAccount() {
      window.location.href = appUrl('/register');
    }

    (function () {
      const overlay = document.querySelector('.page-transition-overlay');

      window.addEventListener('pageshow', () => {
        document.body.classList.remove('transitioning');
        overlay.classList.remove('active');
      });
    })();
  </script>

  <style>
    .error-message {
      color: #d32f2f;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #d32f2f;
      border-radius: 4px;
      background-color: #ffebee;
    }
  </style>
</body>
</html>
